<?php
/** @var Product $product */
/** @var string  $lang */
$priceLabel = class_exists('CurrencyService') && CurrencyService::isEnabled()
    ? CurrencyService::display((int)$product->price)
    : Money::format((int)$product->price, $product->currency);
?>
<div class="max-w-5xl mx-auto px-4 py-8">
  <a href="/<?= $lang ?>/shop" class="text-sm text-[var(--text-secondary)] hover:text-[var(--primary)]">← Shop</a>

  <div class="grid md:grid-cols-2 gap-8 mt-4">
    <div class="rounded-lg overflow-hidden border border-[var(--border-color)] bg-[var(--bg-tertiary)] aspect-square flex items-center justify-center">
      <?php if (!empty($product->coverUrl)): ?>
        <img src="<?= htmlspecialchars($product->coverUrl) ?>" alt="<?= htmlspecialchars($product->t('title', $lang)) ?>" class="w-full h-full object-cover" />
      <?php else: ?>
        <span class="text-7xl text-[var(--text-tertiary)]">📦</span>
      <?php endif ?>
    </div>

    <div>
      <h1 class="text-3xl font-bold"><?= htmlspecialchars($product->t('title', $lang)) ?></h1>
      <div class="text-2xl font-bold text-[var(--primary)] mt-3"><?= htmlspecialchars($priceLabel) ?></div>

      <?php if (!empty($product->kind) && $product->kind !== 'physical'): ?>
        <div class="text-xs uppercase tracking-wider text-[var(--text-tertiary)] mt-1"><?= htmlspecialchars($product->kind) ?></div>
      <?php endif ?>

      <div class="prose prose-sm mt-4 text-[var(--text-secondary)]">
        <?= $product->t('description', $lang) ?>
      </div>

      <button id="addToCart" data-id="<?= (int)$product->id ?>" class="mt-6 w-full md:w-auto px-6 py-3 rounded-lg bg-[var(--primary)] text-white hover:bg-[var(--primary-hover)] font-medium">
        Add to cart
      </button>
      <a href="/<?= $lang ?>/shop/cart" class="ml-2 inline-block text-sm text-[var(--text-secondary)] hover:text-[var(--primary)]">View cart →</a>
    </div>
  </div>
</div>

<script>
  document.getElementById('addToCart')?.addEventListener('click', function () {
    const id = this.dataset.id;
    fetch('/api/v1/shop/cart/items', {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ product_id: parseInt(id, 10), quantity: 1 }),
    }).then(r => r.json()).then(() => {
      window.location.href = '/<?= $lang ?>/shop/cart';
    });
  });
</script>
