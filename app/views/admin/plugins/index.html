<?php
/** @var array $modules */
$lang = Seven::app()->router->getLanguage();
$base = "/{$lang}/admin/module";
?>

<div class="flex items-center justify-between mb-6">
  <h2 class="text-xl font-semibold">Plugins</h2>
  <p class="text-xs text-[var(--text-tertiary)]"><?= count($modules) ?> module(s) discovered</p>
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
  <?php foreach ($modules as $m): ?>
    <div class="p-5 rounded-xl bg-[var(--bg-secondary)] border border-[var(--border-color)]">
      <div class="flex items-start gap-3 mb-2">
        <div class="w-10 h-10 rounded-lg flex items-center justify-center text-white" style="background:var(--primary)">
          <span class="text-sm font-bold"><?= htmlspecialchars(strtoupper(substr($m['name'], 0, 2))) ?></span>
        </div>
        <div class="flex-1 min-w-0">
          <p class="font-semibold flex items-center gap-2">
            <?= htmlspecialchars($m['name']) ?>
            <span class="text-xs text-[var(--text-tertiary)] font-mono">v<?= htmlspecialchars($m['version']) ?></span>
          </p>
          <?php if (!empty($m['meta']['description'])): ?>
            <p class="text-xs text-[var(--text-secondary)] line-clamp-2"><?= htmlspecialchars($m['meta']['description']) ?></p>
          <?php endif ?>
        </div>
        <span class="text-xs px-2 py-0.5 rounded
                     <?= match($m['status']) {
                         'enabled'      => 'bg-emerald-500/15 text-emerald-500',
                         'disabled'     => 'bg-amber-500/15 text-amber-500',
                         'installed'    => 'bg-blue-500/15 text-blue-500',
                         default        => 'bg-slate-500/15 text-slate-500',
                     } ?>"><?= htmlspecialchars($m['status']) ?></span>
      </div>

      <div class="flex flex-wrap gap-2 mt-3">
        <?php if (!$m['installed'] || $m['status'] === 'uninstalled'): ?>
          <a href="<?= $base ?>/install/<?= urlencode($m['name']) ?>"
             class="px-3 py-1 rounded text-xs bg-[var(--primary)] text-white">Install</a>
        <?php else: ?>
          <?php if ($m['status'] !== 'enabled'): ?>
            <a href="<?= $base ?>/enable/<?= urlencode($m['name']) ?>"
               class="px-3 py-1 rounded text-xs bg-emerald-500/15 text-emerald-500 hover:bg-emerald-500/25">Enable</a>
          <?php else: ?>
            <a href="<?= $base ?>/disable/<?= urlencode($m['name']) ?>"
               class="px-3 py-1 rounded text-xs bg-amber-500/15 text-amber-500 hover:bg-amber-500/25">Disable</a>
          <?php endif ?>
          <a href="<?= $base ?>/uninstall/<?= urlencode($m['name']) ?>"
             class="px-3 py-1 rounded text-xs text-red-500 hover:bg-red-500/10"
             data-confirm="Uninstall <?= htmlspecialchars($m['name']) ?>? Tables and data are kept.">
            Uninstall
          </a>
        <?php endif ?>

        <?php if (!empty($m['meta']['permissions'])): ?>
          <details class="ml-auto text-xs text-[var(--text-tertiary)]">
            <summary class="cursor-pointer">Permissions</summary>
            <ul class="mt-1 space-y-0.5">
              <?php foreach ((array)$m['meta']['permissions'] as $p): ?>
                <li class="font-mono">· <?= htmlspecialchars((string)$p) ?></li>
              <?php endforeach ?>
            </ul>
          </details>
        <?php endif ?>
      </div>
    </div>
  <?php endforeach ?>
</div>
