<?php /** @var array $jobs */ ?>
<div class="mb-4 flex items-center justify-between">
  <div>
    <h2 class="text-xl font-semibold">Cron jobs</h2>
    <p class="text-sm text-[var(--text-secondary)] mt-1">
      Run <code class="px-1 rounded bg-[var(--bg-tertiary)]">php bin/sev cron:run</code> from system cron every minute.
    </p>
  </div>
  <a href="/admin/help/topic/cron" class="text-sm text-[var(--primary)] hover:underline">Setup guide →</a>
</div>

  <div class="px-4 py-3 rounded-lg border border-[var(--border-color)] text-sm text-[var(--text-secondary)]">

  </div>
<?php else: ?>
  <div class="overflow-x-auto rounded-lg border border-[var(--border-color)]">
    <table class="w-full text-sm">
      <thead class="bg-[var(--bg-tertiary)] text-[var(--text-secondary)]">
        <tr>
          <th class="text-left px-3 py-2">Name</th>
          <th class="text-left px-3 py-2">Schedule</th>
          <th class="text-left px-3 py-2">Last run</th>
          <th class="text-left px-3 py-2">Next run</th>
          <th class="text-left px-3 py-2">Status</th>
          <th class="text-left px-3 py-2">Duration</th>
          <th class="text-right px-3 py-2">Actions</th>
        </tr>
      </thead>
      <tbody>
        <?php foreach ($jobs as $j): ?>
          <tr class="border-t border-[var(--border-color)]">
            <td class="px-3 py-2 font-mono text-xs"><?= htmlspecialchars($j['name']) ?></td>
            <td class="px-3 py-2 font-mono text-xs"><?= htmlspecialchars($j['schedule']) ?></td>
            <td class="px-3 py-2 text-[var(--text-secondary)]"><?= htmlspecialchars($j['last_run_at'] ?? '—') ?></td>
            <td class="px-3 py-2 text-[var(--text-secondary)]"><?= htmlspecialchars($j['next_run_at'] ?? '—') ?></td>
            <td class="px-3 py-2">
              <?php $st = $j['last_status'] ?? null; ?>
              <?php if ($st === 'ok'): ?>
                <span class="inline-flex items-center gap-1 text-xs px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-500">✓ ok</span>
              <?php elseif ($st === 'error'): ?>
                <span class="inline-flex items-center gap-1 text-xs px-2 py-0.5 rounded bg-red-500/10 text-red-500" title="<?= htmlspecialchars($j['last_error'] ?? '') ?>">✗ error</span>
              <?php elseif ($st === 'skipped'): ?>
                <span class="inline-flex items-center gap-1 text-xs px-2 py-0.5 rounded bg-amber-500/10 text-amber-600">· skipped</span>
              <?php else: ?>
                <span class="text-xs text-[var(--text-tertiary)]">—</span>
              <?php endif ?>
              <?php if (!(int)$j['is_enabled']): ?>
                <span class="ml-1 text-xs text-[var(--text-tertiary)]">(disabled)</span>
              <?php endif ?>
            </td>
            <td class="px-3 py-2 text-[var(--text-secondary)]"><?= isset($j['last_duration_ms']) && $j['last_duration_ms'] !== null ? (int)$j['last_duration_ms'].' ms' : '—' ?></td>
            <td class="px-3 py-2 text-right whitespace-nowrap">
              <a href="/admin/cron/run/<?= urlencode($j['name']) ?>"
                 class="inline-block px-2 py-1 text-xs rounded bg-[var(--bg-tertiary)] hover:bg-[var(--primary)] hover:text-white">Run now</a>
              <form action="/admin/cron/toggle/<?= urlencode($j['name']) ?>" method="post" class="inline">
                <input type="hidden" name="enabled" value="<?= (int)$j['is_enabled'] ? '0' : '1' ?>" />
                <button class="px-2 py-1 text-xs rounded bg-[var(--bg-tertiary)] hover:bg-[var(--primary)] hover:text-white">
                  <?= (int)$j['is_enabled'] ? 'Disable' : 'Enable' ?>
                </button>
              </form>
            </td>
          </tr>
        <?php endforeach ?>
      </tbody>
    </table>
  </div>
<?php endif ?>
