            $isCurrent = $t['slug'] === $current['slug'];
          ?>

              <a href="/<?= $lang ?>/admin/help/topic/<?= htmlspecialchars($t['slug']) ?>"

              <?php if ($isCurrent && !empty($t['anchors'])): ?>

                    <li>
                      <a href="<?= htmlspecialchars($a['hash']) ?>"

                        → <?= htmlspecialchars($a['label']) ?>
                      </a>
                    </li>
                  <?php endforeach ?>

          <?php endforeach ?>
        </ul>
