      <button type="submit"           class="px-3 py-1.5 text-sm rounded bg-[var(--primary)] text-white">Save</button>
    </div>

<script nonce="<?= Csp::nonce() ?>">
(() => {
  const BASE   = <?= json_encode($base) ?>;
  const FOLDER = <?= json_encode($folderId) ?>;

  window.updateQuery = (patch) => {
    const u = new URL(window.location.href);
    Object.entries(patch).forEach(([k, v]) => {
      if (v === '' || v === null || v === undefined) u.searchParams.delete(k);
      else u.searchParams.set(k, v);
    });
    return u.pathname + u.search;
  };

  const post = async (url, formData) => {
    const r = await fetch(url, {
      method: 'POST', body: formData,
      headers: { 'X-Requested-With': 'XMLHttpRequest' },
    });
    return r.json();
  };

  const dz       = document.getElementById('dropzone');
  const picker   = document.getElementById('file-picker');
  const progress = document.getElementById('upload-progress');
  const bar      = progress.querySelector('.bar');
  const doneEl   = progress.querySelector('.done');
  const totalEl  = progress.querySelector('.total');

  ['dragenter', 'dragover'].forEach(ev => dz.addEventListener(ev, e => {
    e.preventDefault();
  }));
  dz.addEventListener('drop',  e => { e.preventDefault(); upload(e.dataTransfer.files); });
  picker.addEventListener('change', e => upload(e.target.files));

  async function upload(fileList) {
    const files = Array.from(fileList || []);
    if (!files.length) return;

    progress.classList.remove('hidden');
    totalEl.textContent = files.length;
    doneEl.textContent  = 0;
    bar.style.width     = '0%';

    let done = 0;
    for (const file of files) {
      const fd = new FormData();
      fd.append('files[]', file);
      if (FOLDER) fd.append('folder_id', FOLDER);
      try { await post(BASE + '/upload', fd); } catch (e) {}
      done++;
      doneEl.textContent = done;
      bar.style.width    = Math.round((done / files.length) * 100) + '%';
    }
    setTimeout(() => window.location.reload(), 400);
  }

  const grid     = document.getElementById('media-grid');
  const bulkBtn  = document.getElementById('bulk-delete');
  const selCount = document.getElementById('sel-count');

  const selected = new Set();
  const refreshBulk = () => {
    selCount.textContent = selected.size;
    bulkBtn.disabled     = selected.size === 0;
  };

  if (grid) {
    grid.addEventListener('change', e => {
      if (!e.target.classList.contains('select-box')) return;
      const id = e.target.closest('.media-card').dataset.id;
      e.target.checked ? selected.add(id) : selected.delete(id);
      refreshBulk();
    });
  }

  bulkBtn.addEventListener('click', async () => {
    if (!selected.size) return;
    if (!confirm(`Delete ${selected.size} item(s)?`)) return;
    const fd = new FormData();
    selected.forEach(id => fd.append('ids[]', id));
    await post(BASE + '/bulk-delete', fd);
    window.location.reload();
  });

  const modal = document.getElementById('edit-modal');
  const form  = document.getElementById('edit-form');
  modal.addEventListener('click', e => {
    if (e.target.dataset.close !== undefined || e.target === modal) modal.close();
  });

  document.querySelectorAll('.edit-btn').forEach(b => b.addEventListener('click', () => {
    const row = JSON.parse(b.dataset.row);
    const alt = (() => { try { return JSON.parse(row.alt || '{}'); } catch { return {}; } })();
    form.id.value          = row.id;
    form.title.value       = row.title       || '';
    form.alt_en.value      = alt.en          || '';
    form.description.value = row.description || '';
    modal.showModal();
  }));

  form.addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData();
    fd.append('title',       form.title.value);
    fd.append('description', form.description.value);
    fd.append('alt[en]',     form.alt_en.value);
    await post(`${BASE}/update/${form.id.value}`, fd);
    modal.close();
    window.location.reload();
  });

  document.getElementById('folder-add').addEventListener('click', async () => {
    const name = prompt('Folder name?');
    if (!name) return;
    const fd = new FormData();
    fd.append('name', name);
    const r = await post(BASE + '/folder/create', fd);
    if (r.ok) window.location.reload();
    else      alert(r.message || 'Failed');
  });

  document.querySelectorAll('.folder-del').forEach(b => b.addEventListener('click', async () => {
    if (!confirm('Delete this folder? It must be empty.')) return;
    const r = await fetch(`${BASE}/folder/delete/${b.dataset.id}`, {
      headers: { 'X-Requested-With': 'XMLHttpRequest' },
    }).then(r => r.json());
    if (r.ok) window.location.reload();
    else      alert(r.message || 'Failed');
  }));
})();
</script>
